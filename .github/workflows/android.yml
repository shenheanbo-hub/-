name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check offline holiday logic
        run: python -m unittest discover -s tests -v

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential ccache cmake git libffi-dev \
            libltdl-dev libncurses5-dev libncursesw5-dev libssl-dev \
            libtool pkg-config python3-dev python3-pip unzip zip zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools<70" "Cython==0.29.36" "buildozer==1.5.0" virtualenv
          buildozer --version

      - name: Cache Android SDK and NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-ubuntu22-api33-ndk25b-arm64-v1

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: overtime-recorder-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
