name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "正式版本号（例如 v1.2.0；留空则只构建测试 APK）"
        required: false
        type: string
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check offline holiday logic
        run: python -m unittest discover -s tests -v

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential ccache cmake git libffi-dev \
            libltdl-dev libncurses5-dev libncursesw5-dev libssl-dev \
            libtool pkg-config python3-dev python3-pip unzip zip zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools<70" "Cython==0.29.36" "buildozer==1.5.0" virtualenv
          buildozer --version

      - name: Cache Android SDK and NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-ubuntu22-api33-ndk25b-arm64-v1

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: overtime-recorder-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Resolve release version
        id: release
        shell: bash
        env:
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          VERSION=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${INPUT_RELEASE_VERSION}"
          fi
          if [[ -n "${VERSION}" && ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "正式版本号必须使用 v1.2.0 这样的格式"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Publish permanent GitHub Release
        if: steps.release.outputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          gh release create "${RELEASE_VERSION}" bin/*.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "加班薪资记录仪 ${RELEASE_VERSION}" \
            --generate-notes
